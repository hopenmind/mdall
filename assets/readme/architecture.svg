<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="gBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
    <linearGradient id="gGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#065f46"/>
      <stop offset="100%" style="stop-color:#064e3b"/>
    </linearGradient>
    <linearGradient id="gPurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5b21b6"/>
      <stop offset="100%" style="stop-color:#4c1d95"/>
    </linearGradient>
    <linearGradient id="gOrange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#92400e"/>
      <stop offset="100%" style="stop-color:#78350f"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4b5563"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="url(#bg)" rx="12"/>
  <rect x="1" y="1" width="898" height="418" fill="none" stroke="#30363d" stroke-width="1" rx="11"/>

  <!-- Title -->
  <text x="450" y="32" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e" text-anchor="middle" letter-spacing="3">ARCHITECTURE</text>

  <!-- ── SOURCE NODE ── -->
  <rect x="30" y="155" width="120" height="110" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <rect x="30" y="155" width="120" height="5" rx="4" fill="#58a6ff"/>
  <text x="90" y="195" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">SOURCE</text>
  <text x="90" y="213" font-family="'Segoe UI', monospace, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">.md / .markdown</text>
  <text x="90" y="230" font-family="'Segoe UI', serif" font-size="13" fill="#58a6ff" text-anchor="middle">∑ ∂ α β</text>
  <text x="90" y="248" font-family="'Segoe UI', monospace, sans-serif" font-size="9" fill="#6e7681" text-anchor="middle">KaTeX · LaTeX</text>

  <!-- Arrow Source → Engine -->
  <line x1="152" y1="210" x2="210" y2="210" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── CORE ENGINE ── -->
  <rect x="210" y="120" width="160" height="180" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <rect x="210" y="120" width="160" height="5" rx="4" fill="url(#gBlue)"/>
  <text x="290" y="150" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">CORE ENGINE</text>
  <!-- KaTeX render -->
  <rect x="224" y="162" width="132" height="26" rx="4" fill="#1f2937" stroke="#374151"/>
  <text x="290" y="179" font-family="'Segoe UI', monospace, sans-serif" font-size="10" fill="#60a5fa" text-anchor="middle">katex (duktape) · server-side</text>
  <!-- Markdown parse -->
  <rect x="224" y="194" width="132" height="26" rx="4" fill="#1f2937" stroke="#374151"/>
  <text x="290" y="211" font-family="'Segoe UI', monospace, sans-serif" font-size="10" fill="#a78bfa" text-anchor="middle">pulldown-cmark · parser</text>
  <!-- Source embed -->
  <rect x="224" y="226" width="132" height="26" rx="4" fill="#1f2937" stroke="#374151"/>
  <text x="290" y="243" font-family="'Segoe UI', monospace, sans-serif" font-size="10" fill="#34d399" text-anchor="middle">source_embed · reversibility</text>
  <!-- Typst -->
  <rect x="224" y="258" width="132" height="26" rx="4" fill="#1f2937" stroke="#374151"/>
  <text x="290" y="275" font-family="'Segoe UI', monospace, sans-serif" font-size="10" fill="#fb923c" text-anchor="middle">typst 0.11 · math render</text>

  <!-- Arrow Engine → Formats -->
  <line x1="372" y1="210" x2="440" y2="210" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── FORMAT OUTPUTS ── -->
  <!-- PDF tier 1 -->
  <rect x="440" y="50" width="145" height="70" rx="7" fill="#161b22" stroke="#1d4ed8" stroke-width="1.5"/>
  <rect x="440" y="50" width="145" height="4" rx="3" fill="url(#gBlue)"/>
  <text x="512" y="74" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" fill="#60a5fa" text-anchor="middle">PDF  Tier 1</text>
  <text x="512" y="90" font-family="'Segoe UI', monospace, sans-serif" font-size="9.5" fill="#8b949e" text-anchor="middle">ungoogled-chromium CDP</text>
  <text x="512" y="106" font-family="'Segoe UI', monospace, sans-serif" font-size="9" fill="#6e7681" text-anchor="middle">KaTeX pixel-perfect · bundled</text>

  <!-- PDF tier 2 -->
  <rect x="440" y="132" width="145" height="62" rx="7" fill="#161b22" stroke="#5b21b6" stroke-width="1.5"/>
  <rect x="440" y="132" width="145" height="4" rx="3" fill="url(#gPurple)"/>
  <text x="512" y="154" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" fill="#a78bfa" text-anchor="middle">PDF  Tier 2</text>
  <text x="512" y="170" font-family="'Segoe UI', monospace, sans-serif" font-size="9.5" fill="#8b949e" text-anchor="middle">Typst · pure Rust math</text>
  <text x="512" y="183" font-family="'Segoe UI', monospace, sans-serif" font-size="9" fill="#6e7681" text-anchor="middle">New Computer Modern Math</text>

  <!-- PDF tier 3 -->
  <rect x="440" y="206" width="145" height="56" rx="7" fill="#161b22" stroke="#92400e" stroke-width="1.5"/>
  <rect x="440" y="206" width="145" height="4" rx="3" fill="url(#gOrange)"/>
  <text x="512" y="228" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" fill="#fb923c" text-anchor="middle">PDF  Tier 3</text>
  <text x="512" y="244" font-family="'Segoe UI', monospace, sans-serif" font-size="9.5" fill="#8b949e" text-anchor="middle">genpdf · unicode approx</text>
  <text x="512" y="257" font-family="'Segoe UI', monospace, sans-serif" font-size="9" fill="#6e7681" text-anchor="middle">always works · system fonts</text>

  <!-- HTML -->
  <rect x="440" y="274" width="145" height="56" rx="7" fill="#161b22" stroke="#065f46" stroke-width="1.5"/>
  <rect x="440" y="274" width="145" height="4" rx="3" fill="url(#gGreen)"/>
  <text x="512" y="296" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" fill="#34d399" text-anchor="middle">HTML</text>
  <text x="512" y="312" font-family="'Segoe UI', monospace, sans-serif" font-size="9.5" fill="#8b949e" text-anchor="middle">embedded KaTeX CSS</text>
  <text x="512" y="325" font-family="'Segoe UI', monospace, sans-serif" font-size="9" fill="#6e7681" text-anchor="middle">self-contained · offline</text>

  <!-- DOCX -->
  <rect x="440" y="342" width="145" height="56" rx="7" fill="#161b22" stroke="#1d4ed8" stroke-width="1.5"/>
  <rect x="440" y="342" width="145" height="4" rx="3" fill="#1d4ed8"/>
  <text x="512" y="364" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="700" fill="#60a5fa" text-anchor="middle">DOCX  ↺ reversible</text>
  <text x="512" y="380" font-family="'Segoe UI', monospace, sans-serif" font-size="9.5" fill="#8b949e" text-anchor="middle">SVG/PNG + source embed</text>
  <text x="512" y="393" font-family="'Segoe UI', monospace, sans-serif" font-size="9" fill="#34d399" text-anchor="middle">re-importable → Markdown</text>

  <!-- Arrows Engine → Formats (vertical fan) -->
  <line x1="390" y1="175" x2="438" y2="85" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowBlue)" opacity="0.7"/>
  <line x1="390" y1="195" x2="438" y2="163" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <line x1="390" y1="210" x2="438" y2="234" stroke="#fb923c" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <line x1="390" y1="225" x2="438" y2="302" stroke="#34d399" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <line x1="390" y1="240" x2="438" y2="370" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>

  <!-- ── RIGHT: OTHER FORMATS ── -->
  <rect x="640" y="90" width="125" height="200" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="702" y="112" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b949e" text-anchor="middle">MORE FORMATS</text>
  <line x1="660" y1="120" x2="742" y2="120" stroke="#30363d" stroke-width="1"/>

  <g font-family="'Segoe UI', monospace, sans-serif" font-size="10" text-anchor="middle">
    <text x="702" y="142" fill="#f472b6">EPUB</text>
    <text x="702" y="162" fill="#fb923c">ODT</text>
    <text x="702" y="182" fill="#a78bfa">LaTeX / .tex</text>
    <text x="702" y="202" fill="#60a5fa">RTF</text>
    <text x="702" y="222" fill="#34d399">TXT</text>
    <text x="702" y="242" fill="#fbbf24">Typst</text>
    <text x="702" y="262" fill="#f87171">SVG equations</text>
  </g>

  <!-- Arrow DOCX → Other formats area -->
  <line x1="587" y1="300" x2="638" y2="250" stroke="#4b5563" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow)" opacity="0.5"/>

  <!-- ── INSTALLER box bottom ── -->
  <rect x="30" y="340" width="370" height="56" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="215" y="362" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b949e" text-anchor="middle">DISTRIBUTION</text>
  <text x="215" y="380" font-family="'Segoe UI', monospace, sans-serif" font-size="9.5" fill="#6e7681" text-anchor="middle">Rust self-extracting stub · cargo-zigbuild · x64 · arm64 · x86</text>
  <text x="215" y="393" font-family="'Segoe UI', monospace, sans-serif" font-size="9" fill="#30363d" text-anchor="middle">~179 MB single .exe · chromium stripped · zero runtime required</text>

  <!-- Legend bottom-right -->
  <text x="870" y="400" font-family="'Segoe UI', monospace, sans-serif" font-size="9" fill="#30363d" text-anchor="end">Hope n' Mind SASU · MD -> ALL v3.0.0</text>
</svg>
